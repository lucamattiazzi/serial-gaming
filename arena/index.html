<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena dei Mostri — Serial Gaming</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../game.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="game-page">
  <header>
    <a class="back" href="../">&larr; Home</a>
    <h1>Arena dei Mostri</h1>
    <a class="api-link" href="docs.html">API per il bot</a>
  </header>

  <section id="setup">
    <div class="player-card" id="card-P1">
      <h2><span class="side-badge">G1</span> Allenatore 1</h2>
      <select id="type-P1" aria-label="Tipo allenatore 1">
        <option value="human" selected>Umano</option>
        <option value="pico">RP2040 (seriale)</option>
        <option value="emu">RP2040 emulato (Python nel browser)</option>
        <option value="cpu-random">CPU casuale</option>
        <option value="cpu-smart">CPU allenatore</option>
      </select>
      <div class="conn-row" id="conn-row-P1" hidden>
        <button id="connect-P1" class="btn small">Connetti</button>
        <span class="conn-status" id="conn-P1">non connesso</span>
      </div>
      <div class="emu-row" id="emu-row-P1" hidden>
        <textarea id="emu-code-P1" class="emu-code" spellcheck="false"></textarea>
        <div class="conn-row">
          <button id="emu-start-P1" class="btn small">Avvia bot</button>
          <span class="conn-status" id="emu-status-P1">non avviato</span>
        </div>
      </div>
    </div>

    <span class="vs">vs</span>

    <div class="player-card" id="card-P2">
      <h2><span class="side-badge">G2</span> Allenatore 2</h2>
      <select id="type-P2" aria-label="Tipo allenatore 2">
        <option value="human">Umano</option>
        <option value="pico" selected>RP2040 (seriale)</option>
        <option value="emu">RP2040 emulato (Python nel browser)</option>
        <option value="cpu-random">CPU casuale</option>
        <option value="cpu-smart">CPU allenatore</option>
      </select>
      <div class="conn-row" id="conn-row-P2">
        <button id="connect-P2" class="btn small">Connetti</button>
        <span class="conn-status" id="conn-P2">non connesso</span>
      </div>
      <div class="emu-row" id="emu-row-P2" hidden>
        <textarea id="emu-code-P2" class="emu-code" spellcheck="false"></textarea>
        <div class="conn-row">
          <button id="emu-start-P2" class="btn small">Avvia bot</button>
          <span class="conn-status" id="emu-status-P2">non avviato</span>
        </div>
      </div>
    </div>
  </section>

  <label class="series-row" id="series-row" hidden>
    <input type="checkbox" id="series-toggle" checked>
    Sfida al meglio di 5
  </label>

  <div class="actions">
    <button id="start-button" class="btn primary">Inizia la sfida</button>
  </div>

  <p id="series-score" hidden></p>

  <div id="timer" hidden>
    <div id="timer-fill"></div>
    <span id="timer-text"></span>
  </div>

  <!-- draft dell'umano -->
  <div id="draft-panel" hidden>
    <h3 id="draft-title">Scegli 3 mostri</h3>
    <div id="draft-roster"></div>
    <button id="draft-confirm" class="btn primary" disabled>Conferma la squadra</button>
  </div>

  <!-- arena -->
  <div id="arena" class="idle">
    <div class="battle-side" id="side-P1">
      <div class="bench" id="bench-P1"></div>
      <div class="fighter" id="fighter-P1">
        <div class="sprite" id="sprite-P1">❔</div>
        <div class="fighter-info">
          <div class="fighter-name" id="name-P1">—</div>
          <div class="hp-bar"><div class="hp-fill" id="hp-P1"></div></div>
          <div class="hp-text" id="hptext-P1"></div>
        </div>
      </div>
    </div>
    <div class="battle-center">⚔️</div>
    <div class="battle-side flip" id="side-P2">
      <div class="bench" id="bench-P2"></div>
      <div class="fighter" id="fighter-P2">
        <div class="sprite" id="sprite-P2">❔</div>
        <div class="fighter-info">
          <div class="fighter-name" id="name-P2">—</div>
          <div class="hp-bar"><div class="hp-fill" id="hp-P2"></div></div>
          <div class="hp-text" id="hptext-P2"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- comandi dell'umano in battaglia -->
  <div id="command-panel" hidden>
    <span id="command-label"></span>
    <div id="move-buttons"></div>
    <div id="switch-buttons"></div>
  </div>

  <pre id="battle-log" hidden></pre>

  <p id="status-display">Scegli gli allenatori e inizia. Draft di 3 mostri, poi battaglia a scelte simultanee.</p>

  <script src="../picoserial.js"></script>
  <script src="../bot-templates.js"></script>
  <script src="../emupico.js"></script>
  <script src="script.js"></script>
</body>

</html>
