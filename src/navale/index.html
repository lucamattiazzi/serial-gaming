<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Battaglia navale — Serial Gaming</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../game.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="game-page">
  <header>
    <a class="back" href="../">&larr; Home</a>
    <h1><span class="game-icon">⚓</span> Battaglia navale</h1>
    <a class="api-link" href="docs.html">API per il bot</a>
  </header>

  <section id="setup">
    <div class="player-card" id="card-P1">
      <h2><span class="side-badge">G1</span> Giocatore 1</h2>
      <select id="type-P1" aria-label="Tipo giocatore 1">
        <option value="human" selected>Umano</option>
        <option value="pico">RP2040 (seriale)</option>
        <option value="emu">RP2040 emulato (Python nel browser)</option>
        <option value="cpu-random">CPU casuale</option>
        <option value="cpu-hunter">CPU cacciatrice</option>
      </select>
      <div class="conn-row" id="conn-row-P1" hidden>
        <button id="connect-P1" class="btn connect">🔌 Connetti RP2040</button>
        <span class="conn-status" id="conn-P1">non connesso</span>
      </div>
      <div class="emu-row" id="emu-row-P1" hidden>
        <textarea id="emu-code-P1" class="emu-code" spellcheck="false"></textarea>
        <div class="conn-row">
          <button id="emu-start-P1" class="btn small">Avvia bot</button>
          <span class="conn-status" id="emu-status-P1">non avviato</span>
        </div>
      </div>
    </div>

    <span class="vs">vs</span>

    <div class="player-card" id="card-P2">
      <h2><span class="side-badge">G2</span> Giocatore 2</h2>
      <select id="type-P2" aria-label="Tipo giocatore 2">
        <option value="human">Umano</option>
        <option value="pico" selected>RP2040 (seriale)</option>
        <option value="emu">RP2040 emulato (Python nel browser)</option>
        <option value="cpu-random">CPU casuale</option>
        <option value="cpu-hunter">CPU cacciatrice</option>
      </select>
      <div class="conn-row" id="conn-row-P2">
        <button id="connect-P2" class="btn connect">🔌 Connetti RP2040</button>
        <span class="conn-status" id="conn-P2">non connesso</span>
      </div>
      <div class="emu-row" id="emu-row-P2" hidden>
        <textarea id="emu-code-P2" class="emu-code" spellcheck="false"></textarea>
        <div class="conn-row">
          <button id="emu-start-P2" class="btn small">Avvia bot</button>
          <span class="conn-status" id="emu-status-P2">non avviato</span>
        </div>
      </div>
    </div>
  </section>

  <label class="series-row" id="series-row" hidden>
    <input type="checkbox" id="series-toggle" checked>
    Sfida al meglio di 5 (chi spara per primo è sorteggiato)
  </label>

  <div class="actions">
    <button id="start-button" class="btn primary">Inizia partita</button>
  </div>

  <p id="series-score" hidden></p>

  <div id="timer" class="idle">
    <div id="timer-fill"></div>
    <span id="timer-text"></span>
  </div>

  <div id="boards" class="idle">
    <div class="board-wrap">
      <h3>Flotta Giocatore 1</h3>
      <div class="sea" id="sea-P1"></div>
    </div>
    <div class="board-wrap">
      <h3>Flotta Giocatore 2</h3>
      <div class="sea" id="sea-P2"></div>
    </div>
  </div>

  <p id="status-display">Scegli i giocatori e inizia. Flotta: 5, 4, 3, 3, 2.</p>

  <script src="../picoserial.js"></script>
  <script src="../bot-templates.js"></script>
  <script src="../emupico.js"></script>
  <script src="../regole.js"></script>
  <script src="../config.js"></script>
  <script src="../botname.js"></script>
  <script src="script.js"></script>
</body>

</html>
