<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Othello — Serial Gaming</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="../game.css">
  <link rel="stylesheet" href="style.css">
</head>

<body class="game-page">
  <header>
    <a class="back" href="../">&larr; Home</a>
    <h1><span class="game-icon">◐</span> Othello</h1>
    <a class="api-link" href="docs.html">API per il bot</a>
  </header>

  <section id="setup">
    <div class="player-card" id="card-B">
      <h2><span class="mark mark-b">⚫</span> Nero (muove per primo)</h2>
      <select id="type-B" aria-label="Tipo giocatore Nero">
        <option value="human" selected>Umano</option>
        <option value="pico">RP2040 (seriale)</option>
        <option value="emu">RP2040 emulato (Python nel browser)</option>
        <option value="cpu-random">CPU facile</option>
        <option value="cpu-smart">CPU difficile</option>
      </select>
      <div class="conn-row" id="conn-row-B" hidden>
        <button id="connect-B" class="btn connect">🔌 Connetti RP2040</button>
        <span class="conn-status" id="conn-B">non connesso</span>
      </div>
      <div class="emu-row" id="emu-row-B" hidden>
        <textarea id="emu-code-B" class="emu-code" spellcheck="false"></textarea>
        <div class="conn-row">
          <button id="emu-start-B" class="btn small">Avvia bot</button>
          <span class="conn-status" id="emu-status-B">non avviato</span>
        </div>
      </div>
    </div>

    <span class="vs">vs</span>

    <div class="player-card" id="card-W">
      <h2><span class="mark mark-w">⚪</span> Bianco</h2>
      <select id="type-W" aria-label="Tipo giocatore Bianco">
        <option value="human">Umano</option>
        <option value="pico" selected>RP2040 (seriale)</option>
        <option value="emu">RP2040 emulato (Python nel browser)</option>
        <option value="cpu-random">CPU facile</option>
        <option value="cpu-smart">CPU difficile</option>
      </select>
      <div class="conn-row" id="conn-row-W">
        <button id="connect-W" class="btn connect">🔌 Connetti RP2040</button>
        <span class="conn-status" id="conn-W">non connesso</span>
      </div>
      <div class="emu-row" id="emu-row-W" hidden>
        <textarea id="emu-code-W" class="emu-code" spellcheck="false"></textarea>
        <div class="conn-row">
          <button id="emu-start-W" class="btn small">Avvia bot</button>
          <span class="conn-status" id="emu-status-W">non avviato</span>
        </div>
      </div>
    </div>
  </section>

  <label class="series-row" id="series-row" hidden>
    <input type="checkbox" id="series-toggle" checked>
    Sfida al meglio di 5
  </label>

  <div class="actions">
    <button id="start-button" class="btn primary">Inizia partita</button>
  </div>

  <p id="series-score" hidden></p>

  <div id="timer" class="idle">
    <div id="timer-fill"></div>
    <span id="timer-text"></span>
  </div>

  <p id="disc-score">⚫ 2 — 2 ⚪</p>

  <div id="game-board" class="idle"></div>

  <p id="status-display">Scegli i giocatori e inizia la partita.</p>

  <script src="../picoserial.js"></script>
  <script src="../bot-templates.js"></script>
  <script src="../emupico.js"></script>
  <script src="../regole.js"></script>
  <script src="../config.js"></script>
  <script src="../botname.js"></script>
  <script src="script.js"></script>
</body>

</html>
